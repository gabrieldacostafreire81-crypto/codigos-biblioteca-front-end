<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livros — Biblioteca</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <script src="./js/data.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/layout.js"></script>
  <script>
    Auth.requireAuth();
    let searchTerm = '';

    function render() {
      const books = DB.getBooks().filter(b => {
        const t = searchTerm.toLowerCase();
        return !t || b.title.toLowerCase().includes(t) || b.author.toLowerCase().includes(t) || b.isbn.toLowerCase().includes(t);
      });

      const rows = books.length === 0
        ? `<tr><td colspan="7" class="empty-state">Nenhum livro encontrado.</td></tr>`
        : books.map(b => `
          <tr>
            <td><strong>${escapeHtml(b.title)}</strong></td>
            <td>${escapeHtml(b.author)}</td>
            <td class="text-muted">${escapeHtml(b.isbn)}</td>
            <td>${escapeHtml(b.category)}</td>
            <td>${b.quantity}</td>
            <td><span class="badge ${b.available > 0 ? 'badge-available' : 'badge-empty'}">${b.available} ${b.available > 0 ? 'disp.' : 'esgotado'}</span></td>
            <td class="actions-cell">
              <button class="btn btn-outline btn-sm" onclick="editBook('${b.id}')">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="deleteBook('${b.id}')">Excluir</button>
            </td>
          </tr>
        `).join('');

      const content = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Livros</h1>
            <p class="page-description">Gerenciar acervo da biblioteca</p>
          </div>
          <button class="btn btn-primary" onclick="newBook()">+ Cadastrar Livro</button>
        </div>
        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="search" placeholder="Buscar por título, autor ou ISBN..." value="${escapeHtml(searchTerm)}" />
          </div>
          <div class="text-muted">${books.length} livro(s)</div>
        </div>
        <div class="table-card">
          <div class="table-wrapper">
            <table class="data-table">
              <thead><tr><th>Título</th><th>Autor</th><th>ISBN</th><th>Categoria</th><th>Qtde</th><th>Disponível</th><th>Ações</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
      renderLayout('books', content);

      document.getElementById('search').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        render();
        setTimeout(() => {
          const inp = document.getElementById('search');
          inp.focus();
          inp.setSelectionRange(inp.value.length, inp.value.length);
        }, 0);
      });
    }

    function newBook() { showBookForm(); }
    function editBook(id) { showBookForm(DB.getBook(id)); }
    function deleteBook(id) {
      if (!confirm('Deseja realmente excluir este livro?')) return;
      DB.deleteBook(id);
      render();
    }

    function showBookForm(book) {
      const isEdit = !!book;
      const b = book || { title: '', author: '', isbn: '', category: '', quantity: 1 };
      const body = `
        <form id="book-form">
          <div class="form-group"><label>Título</label><input name="title" required value="${escapeHtml(b.title)}" /></div>
          <div class="form-group"><label>Autor</label><input name="author" required value="${escapeHtml(b.author)}" /></div>
          <div class="form-row">
            <div class="form-group"><label>ISBN</label><input name="isbn" required value="${escapeHtml(b.isbn)}" /></div>
            <div class="form-group"><label>Categoria</label><input name="category" required value="${escapeHtml(b.category)}" /></div>
          </div>
          <div class="form-group"><label>Quantidade</label><input name="quantity" type="number" min="1" required value="${b.quantity}" /></div>
        </form>
      `;
      const footer = `
        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveBookForm('${isEdit ? b.id : ''}')">${isEdit ? 'Atualizar' : 'Cadastrar'}</button>
      `;
      openModal(isEdit ? 'Editar Livro' : 'Novo Livro', body, footer);
    }

    function saveBookForm(id) {
      const f = document.getElementById('book-form');
      if (!f.reportValidity()) return;
      const fd = new FormData(f);
      const book = {
        id: id || undefined,
        title: fd.get('title'),
        author: fd.get('author'),
        isbn: fd.get('isbn'),
        category: fd.get('category'),
        quantity: parseInt(fd.get('quantity'), 10)
      };
      if (id) {
        const existing = DB.getBook(id);
        const diff = book.quantity - existing.quantity;
        book.available = Math.max(0, existing.available + diff);
      }
      DB.saveBook(book);
      closeModal();
      render();
    }

    render();
  </script>
</body>
</html>
