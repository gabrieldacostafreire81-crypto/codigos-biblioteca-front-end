<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca — Sistema de Gestão</title>
  <meta name="description" content="Sistema de gerenciamento de biblioteca" />
  <link rel="stylesheet" href="/public/styles.css" />
</head>
<body>
  <noscript>
    <p style="text-align:center;padding:2rem;font-family:sans-serif">
      Este sistema precisa de JavaScript ativado.
    </p>
  </noscript>

  <script src="/public/js/auth.js"></script>
  <script>
    try {
      if (Auth.isAuthenticated()) {
        window.location.replace('/public/dashboard.html');
      } else {
        window.location.replace('/login.html');
      }
    } catch (e) {
      console.error('Erro de autenticação:', e);
      window.location.replace('/login.html');
    }
  </script>
</body>
</html>
