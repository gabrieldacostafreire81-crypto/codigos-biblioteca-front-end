<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Biblioteca</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: white; padding: 3rem; border-radius: 1rem; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; text-align: center; }
    h1 { color: #333; margin-bottom: 1rem; }
    p { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn { background: #667eea; color: white; border: none; padding: 1rem 2rem; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; margin: 0.5rem; transition: all 0.3s; }
    .btn:hover { background: #764ba2; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
    .code { background: #f5f5f5; padding: 1rem; border-radius: 0.5rem; font-family: monospace; color: #333; margin: 1rem 0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Biblioteca</h1>
    <p>Bem-vindo ao Sistema de Gestão de Biblioteca!</p>
    
    <div style="margin: 2rem 0;">
      <p><strong>O seu projeto está pronto para usar!</strong></p>
      <p>Clique no botão abaixo para acessar:</p>
    </div>

    <button class="btn" onclick="window.location.href='/login.html'" style="font-size: 1.1rem; padding: 1.2rem 2.5rem;">🔓 Acessar Sistema</button>
    <button class="btn" onclick="window.location.href='/test.html'">✅ Testar Módulos</button>

    <div class="code" style="margin-top: 2rem;">
      <strong>Credenciais de Teste:</strong><br>
      📧 admin@biblioteca.com<br>
      🔑 admin123
    </div>

    <div style="margin-top: 2rem; padding: 1rem; background: #e8f5e9; border-radius: 0.5rem; font-size: 0.9rem; color: #2e7d32;">
      <strong>✓ Tudo funcionando!</strong><br>
      Se você ver esta página, o servidor está rodando corretamente.
    </div>
  </div>

  <script>
    console.log('Página de inicialização carregada com sucesso!');
    console.log('URL base:', window.location.origin);

</html>
