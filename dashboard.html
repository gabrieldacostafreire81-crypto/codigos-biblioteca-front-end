<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Biblioteca</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>
<body>
  <script src="/public/js/data.js"></script>
  <script src="/public/js/auth.js"></script>
  <script src="/public/js/layout.js"></script>
  <script>
    try {
      Auth.requireAuth();

      const books = DB.getBooks();
      const users = DB.getUsers();
      const loans = DB.getLoans();

      const totalBooks = books.reduce((s, b) => s + b.quantity, 0);
      const availableBooks = books.reduce((s, b) => s + b.available, 0);
      const activeLoans = loans.filter(l => l.status === 'active').length;
      const overdueLoans = loans.filter(l => l.status === 'overdue').length;
      const usageRate = totalBooks > 0 ? Math.round(((totalBooks - availableBooks) / totalBooks) * 100) : 0;

      const stats = [
        { label: 'Total de Livros', value: totalBooks, icon: '📚', cls: 'text-primary' },
        { label: 'Disponíveis', value: availableBooks, icon: '✅', cls: 'text-success' },
        { label: 'Empréstimos Ativos', value: activeLoans, icon: '🔄', cls: 'text-accent' },
        { label: 'Em Atraso', value: overdueLoans, icon: '⚠️', cls: 'text-danger' },
        { label: 'Usuários', value: users.length, icon: '👥', cls: 'text-primary' },
        { label: 'Taxa de Uso', value: usageRate + '%', icon: '📈', cls: 'text-accent' }
      ];

      const quickLinks = [
        { label: 'Livros', href: '/books.html', icon: '📚', desc: 'Gerenciar acervo' },
        { label: 'Usuários', href: '/users.html', icon: '👥', desc: 'Cadastro de leitores' },
        { label: 'Empréstimos', href: '/loans.html', icon: '🔄', desc: 'Registrar operações' }
      ];

      const recentLoans = loans.slice(-5).reverse();

      const statusBadge = (s) => {
        const map = { active: ['badge-active', 'Ativo'], returned: ['badge-returned', 'Devolvido'], overdue: ['badge-overdue', 'Em Atraso'] };
        const [cls, label] = map[s] || ['', s];
        return `<span class="badge ${cls}">${label}</span>`;
      };

      const content = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Dashboard</h1>
            <p class="page-description">Visão geral do sistema de biblioteca</p>
          </div>
        </div>

        <div class="stat-grid">
          ${stats.map(s => `
            <div class="stat-card">
              <div class="stat-card-row">
                <div>
                  <div class="stat-label">${s.label}</div>
                  <div class="stat-value">${s.value}</div>
                </div>
                <div class="stat-icon ${s.cls}">${s.icon}</div>
              </div>
            </div>
          `).join('')}
        </div>

        <h2 class="section-title">Acesso Rápido</h2>
        <div class="quick-grid">
          ${quickLinks.map(q => `
            <a href="${q.href}" class="quick-card">
              <div class="quick-icon">${q.icon}</div>
              <div>
                <div class="label">${q.label}</div>
                <div class="desc">${q.desc}</div>
              </div>
            </a>
          `).join('')}
        </div>

        <h2 class="section-title">Empréstimos Recentes</h2>
        <div class="table-card">
          <div class="table-wrapper">
            <table class="data-table">
              <thead>
                <tr><th>Usuário</th><th>Livro</th><th>Devolução</th><th>Status</th></tr>
              </thead>
              <tbody>
                ${recentLoans.length === 0 ? `<tr><td colspan="4" class="empty-state">Nenhum empréstimo registrado.</td></tr>` :
                  recentLoans.map(l => `
                    <tr>
                      <td>${escapeHtml(l.userName)}</td>
                      <td>${escapeHtml(l.bookTitle)}</td>
                      <td class="text-muted">${formatDate(l.dueDate)}</td>
                      <td>${statusBadge(l.status)}</td>
                    </tr>
                  `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;

      renderLayout('dashboard', content);
    } catch (error) {
      console.error('Dashboard error:', error);
      document.body.innerHTML = `<div style="color: red; padding: 2rem; font-family: monospace;"><h1>Erro ao carregar dashboard</h1><pre>${error.message}</pre></div>`;
    }
  </script>
</body>
</html>
