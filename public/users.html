<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuários — Biblioteca</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <script src="./js/data.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/layout.js"></script>
  <script>
    Auth.requireAuth();
    let searchTerm = '';

    function render() {
      const users = DB.getUsers().filter(u => {
        const t = searchTerm.toLowerCase();
        return !t || u.name.toLowerCase().includes(t) || u.email.toLowerCase().includes(t);
      });

      const rows = users.length === 0
        ? `<tr><td colspan="5" class="empty-state">Nenhum usuário encontrado.</td></tr>`
        : users.map(u => `
          <tr>
            <td><strong>${escapeHtml(u.name)}</strong></td>
            <td>${escapeHtml(u.email)}</td>
            <td class="text-muted">${escapeHtml(u.phone)}</td>
            <td class="text-muted">${formatDate(u.registeredAt)}</td>
            <td class="actions-cell">
              <button class="btn btn-outline btn-sm" onclick="editUser('${u.id}')">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">Excluir</button>
            </td>
          </tr>
        `).join('');

      const content = `
        <div class="page-header">
          <div>
            <h1 class="page-title">Usuários</h1>
            <p class="page-description">Cadastro de leitores</p>
          </div>
          <button class="btn btn-primary" onclick="newUser()">+ Cadastrar Usuário</button>
        </div>
        <div class="toolbar">
          <div class="search-box">
            <input type="text" id="search" placeholder="Buscar por nome ou email..." value="${escapeHtml(searchTerm)}" />
          </div>
          <div class="text-muted">${users.length} usuário(s)</div>
        </div>
        <div class="table-card">
          <div class="table-wrapper">
            <table class="data-table">
              <thead><tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Cadastro</th><th>Ações</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
      renderLayout('users', content);

      document.getElementById('search').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        render();
        setTimeout(() => {
          const inp = document.getElementById('search');
          inp.focus();
          inp.setSelectionRange(inp.value.length, inp.value.length);
        }, 0);
      });
    }

    function newUser() { showUserForm(); }
    function editUser(id) { showUserForm(DB.getUser(id)); }
    function deleteUser(id) {
      if (!confirm('Deseja realmente excluir este usuário?')) return;
      DB.deleteUser(id);
      render();
    }

    function showUserForm(user) {
      const isEdit = !!user;
      const u = user || { name: '', email: '', phone: '' };
      const body = `
        <form id="user-form">
          <div class="form-group"><label>Nome</label><input name="name" required value="${escapeHtml(u.name)}" /></div>
          <div class="form-group"><label>Email</label><input name="email" type="email" required value="${escapeHtml(u.email)}" /></div>
          <div class="form-group"><label>Telefone</label><input name="phone" required value="${escapeHtml(u.phone)}" /></div>
        </form>
      `;
      const footer = `
        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveUserForm('${isEdit ? u.id : ''}')">${isEdit ? 'Atualizar' : 'Cadastrar'}</button>
      `;
      openModal(isEdit ? 'Editar Usuário' : 'Novo Usuário', body, footer);
    }

    function saveUserForm(id) {
      const f = document.getElementById('user-form');
      if (!f.reportValidity()) return;
      const fd = new FormData(f);
      DB.saveUser({
        id: id || undefined,
        name: fd.get('name'),
        email: fd.get('email'),
        phone: fd.get('phone')
      });
      closeModal();
      render();
    }

    render();
  </script>
</body>
</html>
